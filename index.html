<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMS 단어 테스트 생성기 v12 (수정판)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        @media print {
            body { background-color: #ffffff; padding: 0; }
            .no-print { display: none !important; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8" onload="initApp()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 bg-white p-6 rounded-3xl shadow-xl border border-slate-200/60 no-print space-y-6 self-start">
            <h1 class="text-xl font-extrabold text-slate-900">📝 TEST GENERATOR <span class="text-blue-600 font-medium text-sm">v12.0</span></h1>
            
            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl space-y-3">
                <h2 class="text-sm font-bold text-indigo-900">💾 보관함</h2>
                <div class="flex flex-col gap-2">
                    <select id="savedBookList" onchange="updateUnitList()" class="w-full p-2.5 border border-indigo-200 rounded-lg text-sm"></select>
                    <div class="flex gap-2">
                        <select id="savedUnitList" class="flex-1 p-2.5 border border-indigo-200 rounded-lg text-sm" disabled></select>
                        <button onclick="loadVocab()" class="bg-indigo-600 text-white text-xs font-bold py-2 px-4 rounded-lg">불러오기</button>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="bookTitle" oninput="updateHeader()" placeholder="책 제목" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm">
                    <input type="text" id="bookUnit" oninput="updateHeader()" placeholder="Unit" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm">
                </div>
                <textarea id="excelInput" class="w-full h-32 p-3 border border-slate-200 rounded-xl text-xs font-mono bg-slate-50" placeholder="단어&#9;뜻"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="wordCount" value="20" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm" placeholder="문항 수">
                <select id="testType" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm">
                    <option value="mix">혼합형</option>
                    <option value="eng">영어➔뜻</option>
                    <option value="kor">뜻➔영어</option>
                </select>
            </div>

            <div class="flex gap-2">
                <button onclick="generateTest()" class="flex-1 bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl">⚡ 빌드</button>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl">🖨️ 인쇄</button>
            </div>
        </div>

        <div class="lg:col-span-7 bg-white p-8 rounded-3xl shadow-xl border border-slate-200/60">
            <div id="printArea">
                <div id="testPaper">
                    <div class="border-2 border-slate-900 p-4 mb-6">
                        <div class="flex justify-between border-b border-slate-400 pb-3">
                            <div class="text-sm font-black tracking-widest uppercase">YMS</div>
                            <div id="viewBookTitle" class="text-base font-black">제목을 입력하세요</div>
                        </div>
                        <div class="flex text-xs font-bold mt-3 gap-4">
                            <div id="viewDate">Date: 2026. 07. 13</div>
                            <div>Unit: <span id="viewBookUnit"></span></div>
                        </div>
                    </div>
                    <ol id="testList" class="grid grid-cols-2 gap-x-12 gap-y-3 text-xs font-medium"></ol>
                </div>
                <div class="page-break mt-20 pt-10 border-t-2 border-dashed border-slate-300">
                    <h3 class="text-lg font-black mb-6 text-slate-800 underline">Answer Key</h3>
                    <div id="answerList" class="grid grid-cols-3 gap-4 text-xs font-mono text-slate-600"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'yms_voca_library';
        
        function initApp() {
            const d = new Date();
            document.getElementById('viewDate').innerText = `Date: ${d.getFullYear()}. ${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getDate()).padStart(2,'0')}`;
            renderBookList();
        }

        function renderBookList() {
            const lib = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const select = document.getElementById('savedBookList');
            select.innerHTML = '<option value="">▼ 책 선택</option>' + [...new Set(Object.values(lib).map(i => i.title))].map(b => `<option value="${b}">${b}</option>`).join('');
        }

        function updateUnitList() {
            const lib = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const book = document.getElementById('savedBookList').value;
            const select = document.getElementById('savedUnitList');
            select.innerHTML = '<option value="">▼ 유닛 선택</option>';
            Object.entries(lib).forEach(([k, v]) => { if (v.title === book) select.innerHTML += `<option value="${k}">${v.unit || '전체'}</option>`; });
            select.disabled = false;
        }

        function loadVocab() {
            const key = document.getElementById('savedUnitList').value;
            const lib = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            if (lib[key]) {
                document.getElementById('bookTitle').value = lib[key].title;
                document.getElementById('bookUnit').value = lib[key].unit;
                document.getElementById('excelInput').value = lib[key].text;
                updateHeader();
            }
        }

        function updateHeader() {
            document.getElementById('viewBookTitle').innerText = document.getElementById('bookTitle').value || '제목 입력';
            document.getElementById('viewBookUnit').innerText = document.getElementById('bookUnit').value || '';
        }

        function generateTest() {
            updateHeader();
            const text = document.getElementById('excelInput').value.trim();
            const count = parseInt(document.getElementById('wordCount').value); // 문항 수 정상 반영
            const type = document.getElementById('testType').value;
            if (!text) return alert('데이터를 입력해주세요!');

            let words = text.split('\n').map(line => {
                let p = line.split(/\t|,/);
                return { eng: p[0]?.trim(), kor: p[1]?.trim() };
            }).filter(w => w.eng && w.kor);

            words.sort(() => Math.random() - 0.5);
            const sel = words.slice(0, count);
            const testList = document.getElementById('testList');
            const ansList = document.getElementById('answerList');
            testList.innerHTML = ''; ansList.innerHTML = '';
            const half = Math.ceil(sel.length / 2);

            sel.forEach((w, i) => {
                const idx = String(i + 1).padStart(2, '0');
                const isE = (type === 'eng') || (type === 'mix' && i < half);
                testList.innerHTML += `<li class="border-b border-slate-100 py-2.5 flex items-center justify-between"><span class="w-6 font-extrabold text-slate-400">${idx}</span><div class="flex-1 flex items-center">${isE ? w.eng : w.kor} <span class="mx-2 text-slate-300">➔</span> <span class="flex-1 border-b border-slate-300 h-4"></span></div></li>`;
                ansList.innerHTML += `<div class="py-1"><span class="font-bold text-slate-400">${idx}.</span> ${isE ? w.eng : w.kor} = <span class="text-blue-600 font-bold">${isE ? w.kor : w.eng}</span></div>`;
            });
        }
    </script>
</body>
</html>
